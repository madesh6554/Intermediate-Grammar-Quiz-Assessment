<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 1 — Day 1–10 | English Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="quiz-nav">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      All Quizzes
    </a>
    <span class="quiz-nav-title">Quiz 1 · Day 1–10</span>
    <span class="quiz-nav-counter" id="navCounter">0 / 10</span>
  </nav>

  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>

  <main class="quiz-wrapper">

    <div class="quiz-header">
      <div class="quiz-day-badge">Intermediate · Day 1 – 10</div>
      <h1 class="quiz-title">Grammar Foundations</h1>
      <p class="quiz-subtitle">Past Tense &nbsp;·&nbsp; Articles &nbsp;·&nbsp; Prepositions &nbsp;·&nbsp; Modals</p>
    </div>

    <div id="questionsContainer"></div>

    <div class="submit-area" id="submitArea">
      <button class="btn-submit" id="submitBtn" disabled>Submit Quiz</button>
      <p class="submit-hint" id="submitHint">Answer all 10 questions to submit</p>
    </div>

    <div class="score-card hidden" id="scoreCard">
      <div class="score-circle">
        <span class="score-number" id="scoreNumber">0</span>
        <span class="score-denom">/10</span>
      </div>
      <div class="score-percentage" id="scorePercent">0%</div>
      <div class="score-label">Your Score</div>
      <p class="score-message" id="scoreMessage"></p>
      <div class="score-actions">
        <button class="btn-review" id="reviewBtn">Review Answers</button>
        <button class="btn-retry" id="retryBtn">Try Again</button>
        <a href="quiz2.html" class="btn-next">
          Next Quiz
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>

  </main>

  <footer class="quiz-footer">
    <a href="index.html">← All Quizzes</a>
    <span class="quiz-footer-brand">English Partner · Grammar Practice</span>
    <a href="quiz2.html">Quiz 2 →</a>
  </footer>

  <script>
    const QUESTIONS = [
      {
        id: 1,
        text: 'Which sentence correctly uses "had" for past possession?',
        options: {
          A: 'I had a blue car last year.',
          B: 'I did had a blue car last year.',
          C: 'I have had a blue car last year.',
          D: 'I was had a blue car last year.'
        },
        answer: 'A'
      },
      {
        id: 2,
        text: 'Choose the correct article: "I saw ___ airplane in the sky."',
        options: {
          A: 'a',
          B: 'an',
          C: 'the',
          D: 'No article needed'
        },
        answer: 'B'
      },
      {
        id: 3,
        text: 'Which preposition completes the sentence: "The book is ___ the table."',
        options: {
          A: 'in',
          B: 'at',
          C: 'on',
          D: 'for'
        },
        answer: 'C'
      },
      {
        id: 4,
        text: 'Complete the sentence: "I am going ___ the market."',
        options: {
          A: 'for',
          B: 'of',
          C: 'to',
          D: 'with'
        },
        answer: 'C'
      },
      {
        id: 5,
        text: 'Which preposition fits: "He is traveling ___ bus."',
        options: {
          A: 'over',
          B: 'with',
          C: 'by',
          D: 'about'
        },
        answer: 'C'
      },
      {
        id: 6,
        text: 'What is the 3rd form (V3) of the verb "Go"?',
        options: {
          A: 'Go',
          B: 'Went',
          C: 'Gone',
          D: 'Going'
        },
        answer: 'C'
      },
      {
        id: 7,
        text: 'Which modal verb expresses strong obligation?',
        options: {
          A: 'Should',
          B: 'Must',
          C: 'Could',
          D: 'Would'
        },
        answer: 'B'
      },
      {
        id: 8,
        text: 'Which sentence describes past ability?',
        options: {
          A: 'I can swim fast.',
          B: 'I could swim fast when I was young.',
          C: 'I should swim fast.',
          D: 'I must swim fast.'
        },
        answer: 'B'
      },
      {
        id: 9,
        text: 'Complete the sentence: "I _______ play cricket every Sunday." (habitual past action)',
        options: {
          A: 'would',
          B: 'used to',
          C: 'had',
          D: 'did'
        },
        answer: 'B'
      },
      {
        id: 10,
        text: 'When comparing "Would" and "Used to," which is used for repeated past actions but NOT for past states?',
        options: {
          A: 'Used to',
          B: 'Would',
          C: 'Had',
          D: 'Must'
        },
        answer: 'B'
      }
    ];

    const STATE = { selected: {}, submitted: false, score: 0 };

    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = QUESTIONS.map((q, idx) => `
        <div class="question-card" data-index="${idx}" id="card-${idx}">
          <div class="question-meta">
            <span class="question-number">Question ${q.id} <span style="color:var(--text-muted);font-weight:500">of 10</span></span>
            <div class="question-status" id="status-${idx}"></div>
          </div>
          <p class="question-text">${q.text}</p>
          <ul class="options-list">
            ${Object.entries(q.options).map(([letter, text]) => `
              <li class="option-item" data-option="${letter}" data-index="${idx}">
                <span class="option-letter">${letter}</span>
                <span class="option-text">${text}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `).join('');
    }

    function updateProgress() {
      const answered = Object.keys(STATE.selected).length;
      const pct = (answered / QUESTIONS.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('navCounter').textContent = answered + ' / ' + QUESTIONS.length;
      const btn = document.getElementById('submitBtn');
      const hint = document.getElementById('submitHint');
      if (answered === QUESTIONS.length) {
        btn.disabled = false;
        hint.textContent = 'All questions answered — ready to submit!';
      } else {
        btn.disabled = true;
        const rem = QUESTIONS.length - answered;
        hint.textContent = rem + ' question' + (rem > 1 ? 's' : '') + ' remaining';
      }
    }

    function handleSubmit() {
      if (STATE.submitted) return;
      STATE.submitted = true;
      STATE.score = 0;

      QUESTIONS.forEach((q, idx) => {
        const card = document.querySelector(`.question-card[data-index="${idx}"]`);
        const userAnswer = STATE.selected[idx];
        const correct = q.answer;

        card.querySelectorAll('.option-item').forEach(opt => {
          opt.classList.add('disabled');
          const letter = opt.dataset.option;
          if (letter === correct) {
            opt.classList.add('correct');
            opt.insertAdjacentHTML('beforeend', '<span class="result-icon">✓</span>');
          } else if (letter === userAnswer && userAnswer !== correct) {
            opt.classList.add('wrong');
            opt.insertAdjacentHTML('beforeend', '<span class="result-icon">✗</span>');
          }
        });

        if (userAnswer === correct) STATE.score++;
      });

      showScoreCard();
    }

    function showScoreCard() {
      const pct = Math.round((STATE.score / QUESTIONS.length) * 100);
      document.getElementById('scoreNumber').textContent = STATE.score;
      document.getElementById('scorePercent').textContent = pct + '%';
      document.getElementById('scoreMessage').textContent = getMessage(STATE.score);
      document.getElementById('submitArea').classList.add('hidden');
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('navCounter').textContent = '10 / 10';
      const sc = document.getElementById('scoreCard');
      sc.classList.remove('hidden');
      sc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function getMessage(score) {
      if (score === 10) return "Perfect score! You've completely mastered Day 1–10. Outstanding!";
      if (score >= 8)  return "Excellent work! You have a strong grasp of these grammar topics.";
      if (score >= 6)  return "Good job! A little more practice and you'll ace it next time.";
      if (score >= 4)  return "Keep going! Review the highlighted answers and try again.";
      return "Don't give up — every attempt helps you learn. Review and retry!";
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderQuestions();

      document.getElementById('questionsContainer').addEventListener('click', e => {
        if (STATE.submitted) return;
        const option = e.target.closest('.option-item');
        if (!option) return;
        const idx = parseInt(option.dataset.index);
        const letter = option.dataset.option;
        const card = document.querySelector(`.question-card[data-index="${idx}"]`);

        card.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        STATE.selected[idx] = letter;

        card.classList.add('answered');
        const statusEl = document.getElementById('status-' + idx);
        statusEl.classList.add('answered');

        updateProgress();
      });

      document.getElementById('submitBtn').addEventListener('click', handleSubmit);

      document.getElementById('reviewBtn').addEventListener('click', () => {
        document.getElementById('questionsContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      document.getElementById('retryBtn').addEventListener('click', () => {
        STATE.selected = {};
        STATE.submitted = false;
        STATE.score = 0;
        renderQuestions();
        document.getElementById('scoreCard').classList.add('hidden');
        document.getElementById('submitArea').classList.remove('hidden');
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitHint').textContent = 'Answer all 10 questions to submit';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('navCounter').textContent = '0 / 10';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>

</body>
</html>
