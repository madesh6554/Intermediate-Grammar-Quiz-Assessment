<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 3 — Day 21–30 | English Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="quiz-nav">
    <img src="english-partner-logo.png" alt="English Partner — The Language Hub" class="nav-logo">
    <span class="quiz-nav-counter" id="navCounter">0 / 10</span>
  </nav>

  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>

  <main class="quiz-wrapper">

    <div class="quiz-header">
      <div class="quiz-day-badge">Intermediate · Day 21 – 30</div>
      <h1 class="quiz-title">Perfect Tenses &amp; More</h1>
      <p class="quiz-subtitle">Present Perfect &nbsp;·&nbsp; Spoken English &nbsp;·&nbsp; Conjunctions &nbsp;·&nbsp; Relative Pronouns</p>
    </div>

    <div id="questionsContainer"></div>

    <div class="submit-area" id="submitArea">
      <button class="btn-submit" id="submitBtn" disabled>Submit Quiz</button>
      <p class="submit-hint" id="submitHint">Answer all 10 questions to submit</p>
    </div>

  </main>

  <!-- SCORE POPUP MODAL -->
  <div class="score-modal-overlay hidden" id="scoreModal">
    <div class="score-card">
      <div class="score-circle">
        <span class="score-number" id="scoreNumber">0</span>
        <span class="score-denom">/10</span>
      </div>
      <div class="score-percentage" id="scorePercent">0%</div>
      <div class="score-label">Your Score</div>
      <div class="score-out-of" id="scoreOutOf">You scored 0 out of 10</div>
      <p class="score-message" id="scoreMessage"></p>
      <div class="score-actions">
        <button class="btn-review" id="reviewBtn">Review Answers</button>
        <button class="btn-retry" id="retryBtn">Try Again</button>
      </div>
    </div>
  </div>

  <footer class="quiz-footer">
    <span class="quiz-footer-brand">English Partner · Grammar Practice</span>
  </footer>

  <script>
    const QUESTIONS = [
      {
        id: 21,
        text: 'Which sentence correctly uses Present Perfect for a recently completed action?',
        options: {
          A: 'I finished my lunch just now.',
          B: 'I have finished my lunch just now.',
          C: 'I am finishing my lunch just now.',
          D: 'I had finish my lunch just now.'
        },
        answer: 'B'
      },
      {
        id: 22,
        text: 'In "He has ____ to the office," which verb form is correct?',
        options: {
          A: 'go',
          B: 'went',
          C: 'gone',
          D: 'going'
        },
        answer: 'C'
      },
      {
        id: 23,
        text: 'What is a key difference between spoken and written English?',
        options: {
          A: 'Spoken English never uses grammar.',
          B: 'Written English uses more informal contractions.',
          C: 'Spoken English uses informal contractions like "gonna" or "wanna."',
          D: 'There is no difference.'
        },
        answer: 'C'
      },
      {
        id: 24,
        text: 'Which is the correct existential sentence for a single object in a room?',
        options: {
          A: 'There are a chair in the room.',
          B: 'There is a chair in the room.',
          C: 'It is a chair in the room.',
          D: 'There was many chairs in the room.'
        },
        answer: 'B'
      },
      {
        id: 25,
        text: 'Which tense is used for an action that started in the past and is still continuing?',
        options: {
          A: 'Present Perfect',
          B: 'Present Continuous',
          C: 'Present Perfect Continuous',
          D: 'Simple Present'
        },
        answer: 'C'
      },
      {
        id: 26,
        text: 'Complete for duration: "I have been waiting ____ two hours."',
        options: {
          A: 'since',
          B: 'for',
          C: 'from',
          D: 'at'
        },
        answer: 'B'
      },
      {
        id: 27,
        text: 'Which modal verb expresses a lower level of possibility?',
        options: {
          A: 'Must',
          B: 'Will',
          C: 'Might',
          D: 'Should'
        },
        answer: 'C'
      },
      {
        id: 28,
        text: 'Which conjunction explains a "result"?',
        options: {
          A: 'Because',
          B: 'So',
          C: 'But',
          D: 'Although'
        },
        answer: 'B'
      },
      {
        id: 29,
        text: 'When comparing past and future questions, which auxiliary verbs are used?',
        options: {
          A: 'Do and Does',
          B: 'Was and Were',
          C: 'Did and Will',
          D: 'Have and Has'
        },
        answer: 'C'
      },
      {
        id: 30,
        text: 'Which relative pronoun is used specifically for people?',
        options: {
          A: 'Which',
          B: 'What',
          C: 'Who',
          D: 'Where'
        },
        answer: 'C'
      }
    ];

    const STATE = { selected: {}, submitted: false, score: 0 };

    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = QUESTIONS.map((q, idx) => `
        <div class="question-card" data-index="${idx}" id="card-${idx}">
          <div class="question-meta">
            <span class="question-number">Question ${q.id} <span style="color:var(--text-muted);font-weight:500">of 30</span></span>
            <div class="question-status" id="status-${idx}"></div>
          </div>
          <p class="question-text">${q.text}</p>
          <ul class="options-list">
            ${Object.entries(q.options).map(([letter, text]) => `
              <li class="option-item" data-option="${letter}" data-index="${idx}">
                <span class="option-letter">${letter}</span>
                <span class="option-text">${text}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `).join('');
    }

    function updateProgress() {
      const answered = Object.keys(STATE.selected).length;
      const pct = (answered / QUESTIONS.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('navCounter').textContent = answered + ' / ' + QUESTIONS.length;
      const btn = document.getElementById('submitBtn');
      const hint = document.getElementById('submitHint');
      if (answered === QUESTIONS.length) {
        btn.disabled = false;
        hint.textContent = 'All questions answered — ready to submit!';
      } else {
        btn.disabled = true;
        const rem = QUESTIONS.length - answered;
        hint.textContent = rem + ' question' + (rem > 1 ? 's' : '') + ' remaining';
      }
    }

    function handleSubmit() {
      if (STATE.submitted) return;
      STATE.submitted = true;
      STATE.score = 0;

      QUESTIONS.forEach((q, idx) => {
        const card = document.querySelector(`.question-card[data-index="${idx}"]`);
        const userAnswer = STATE.selected[idx];
        const correct = q.answer;

        card.querySelectorAll('.option-item').forEach(opt => {
          opt.classList.add('disabled');
          const letter = opt.dataset.option;
          if (letter === correct) {
            opt.classList.add('correct');
            opt.insertAdjacentHTML('beforeend', '<span class="result-icon">✓</span>');
          } else if (letter === userAnswer && userAnswer !== correct) {
            opt.classList.add('wrong');
            opt.insertAdjacentHTML('beforeend', '<span class="result-icon">✗</span>');
          }
        });

        if (userAnswer === correct) STATE.score++;
      });

      showScoreCard();
    }

    function showScoreCard() {
      const pct = Math.round((STATE.score / QUESTIONS.length) * 100);
      document.getElementById('scoreNumber').textContent = STATE.score;
      document.getElementById('scorePercent').textContent = pct + '%';
      document.getElementById('scoreOutOf').textContent = 'You scored ' + STATE.score + ' out of ' + QUESTIONS.length;
      document.getElementById('scoreMessage').textContent = getMessage(STATE.score);
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('navCounter').textContent = '10 / 10';
      document.getElementById('scoreModal').classList.remove('hidden');
    }

    function getMessage(score) {
      if (score === 10) return "Perfect score! You've completely mastered Day 21–30. Excellent work!";
      if (score >= 8)  return "Excellent! Your understanding of perfect tenses and conjunctions is strong.";
      if (score >= 6)  return "Good job! Review the highlighted topics to close the gaps.";
      if (score >= 4)  return "Keep going! Focus on perfect tenses and relative pronouns.";
      return "Don't give up — review the answers and try again. You've got this!";
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderQuestions();

      document.getElementById('questionsContainer').addEventListener('click', e => {
        if (STATE.submitted) return;
        const option = e.target.closest('.option-item');
        if (!option) return;
        const idx = parseInt(option.dataset.index);
        const letter = option.dataset.option;
        const card = document.querySelector(`.question-card[data-index="${idx}"]`);

        card.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        STATE.selected[idx] = letter;

        card.classList.add('answered');
        document.getElementById('status-' + idx).classList.add('answered');

        updateProgress();
      });

      document.getElementById('submitBtn').addEventListener('click', handleSubmit);

      document.getElementById('reviewBtn').addEventListener('click', () => {
        document.getElementById('scoreModal').classList.add('hidden');
        document.getElementById('questionsContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      document.getElementById('retryBtn').addEventListener('click', () => {
        document.getElementById('scoreModal').classList.add('hidden');
        STATE.selected = {};
        STATE.submitted = false;
        STATE.score = 0;
        renderQuestions();
        document.getElementById('submitArea').classList.remove('hidden');
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitHint').textContent = 'Answer all 10 questions to submit';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('navCounter').textContent = '0 / 10';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>

</body>
</html>
